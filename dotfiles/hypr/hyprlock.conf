background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.02
    contrast = 1.1
    brightness = 0.8
    vibrancy = 0.2
}

# CLOCK
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(220, 220, 220, 1.0)
    font_size = 96
    font_family = Sans
    position = 0, 80
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(200, 200, 200, 0.8)
    font_size = 22
    font_family = Sans
    position = 0, 10
    halign = center
    valign = center
}

# PASSWORD FIELD
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2

    outer_color = rgba(120,120,120,0.3)
    inner_color = rgba(30,30,30,0.6)
    font_color = rgba(220,220,220,1.0)

    fade_on_empty = false
    placeholder_text = Password...

    dots_center = true

    position = 0, -80
    halign = center
    valign = center
}
